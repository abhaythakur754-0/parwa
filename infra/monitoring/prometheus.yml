global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "parwa-backend"
    metrics_path: "/health/metrics"
    static_configs:
      - targets:
          - "backend:8000"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "celery-exporter"
    static_configs:
      - targets:
          - "celery-exporter:9808"

  - job_name: "postgres-exporter"
    static_configs:
      - targets:
          - "postgres-exporter:9187"

  - job_name: "redis-exporter"
    static_configs:
      - targets:
          - "redis-exporter:9121"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"
