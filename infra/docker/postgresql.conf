# ════════════════════════════════════════════════════════════════
# PARWA — PostgreSQL Production Configuration
# Optimized for PARWA workload
# ════════════════════════════════════════════════════════════════

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 200

# Memory Settings
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB
dynamic_shared_memory_type = posix

# WAL Settings
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 2GB
min_wal_size = 512MB

# Query Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'ddl'
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Replication (for future use)
wal_level = replica
max_wal_senders = 3
wal_keep_size = 64MB

# Security
# E1: SSL enabled for internal encryption between services.
# Self-signed certificates should be generated in the database init script
# (e.g., docker-entrypoint-initdb.d/) and placed at the paths below.
ssl = on
ssl_cert_file = '/var/lib/postgresql/server.crt'
ssl_key_file = '/var/lib/postgresql/server.key'
ssl_ca_file = '/var/lib/postgresql/ca.crt'

# Autovacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# Statement Timeout
statement_timeout = 30000  # 30 seconds
idle_in_transaction_session_timeout = 60000  # 60 seconds

# Timezone
timezone = 'UTC'
