# ════════════════════════════════════════════════════════════════
# PARWA — PostgreSQL Production Configuration
# Optimized for PARWA workload
# ════════════════════════════════════════════════════════════════

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 100

# Memory Settings
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 2MB
maintenance_work_mem = 64MB
dynamic_shared_memory_type = posix
shared_preload_libraries = 'pg_stat_statements'

# WAL Settings
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 2GB
min_wal_size = 512MB

# Query Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'mod'
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_rotation_age = '1d'
log_rotation_size = '100MB'

# Replication (for future use)
wal_level = replica
max_wal_senders = 3
wal_keep_size = 64MB
archive_mode = on
archive_command = 'cp %p /var/lib/postgresql/archive/%f'

# Security
# SSL — Enabled with certificate paths.
# ┌─────────────────────────────────────────────────────────────────┐
# │ DEVELOPMENT: Generate self-signed certificates:                │
# │   openssl req -new -x509 -days 365 -nodes \
# │     -text -out /etc/ssl/certs/server.crt \
# │     -keyout /etc/ssl/private/server.key \
# │     -subj "/CN=parwa-db"                                       │
# │   chmod 600 /etc/ssl/private/server.key                       │
# │                                                                │
# │ PRODUCTION: Use Let's Encrypt or your org's CA-signed certs:  │
# │   1. Obtain cert via certbot / ACME client                     │
# │   2. Mount cert + key as Docker volumes at the paths below    │
# │   3. Ensure key file is readable only by postgres (mode 0600) │
# │   4. Set ssl_ca_file if using a custom CA chain               │
# └─────────────────────────────────────────────────────────────────┘
ssl = on
ssl_cert_file = '/etc/ssl/certs/server.crt'
ssl_key_file = '/etc/ssl/private/server.key'
# ssl_ca_file = '/etc/ssl/certs/ca-bundle.crt'   -- Uncomment for custom CA chain
# ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL:!MD5'  -- Override if needed

# Autovacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# Statement Timeout
statement_timeout = 30000  # 30 seconds
idle_in_transaction_session_timeout = 60000  # 60 seconds

# Timezone
timezone = 'UTC'
