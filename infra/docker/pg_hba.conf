# ════════════════════════════════════════════════════════════════
# PARWA — PostgreSQL Host-Based Authentication
# ════════════════════════════════════════════════════════════════

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections (Unix socket) — peer auth (no password needed, OS user must match)
local   all             all                                     peer

# IPv4 local connections (from Docker network)
# TODO: Switch to hostssl when SSL is enabled in postgresql.conf
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256

# IPv6 local connections
host    all             all             ::1/128                 scram-sha-256

# Replication connections — dedicated replication user
host    replication     parwa_replication  127.0.0.1/32        scram-sha-256
host    replication     parwa_replication  ::1/128             scram-sha-256
host    replication     parwa_replication  172.16.0.0/12       scram-sha-256
