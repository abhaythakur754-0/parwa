# ════════════════════════════════════════════════════════════════
# PARWA — Redis Production Configuration
# ════════════════════════════════════════════════════════════════

# Network — bind to all interfaces but protected-mode + requirepass provide security
bind 0.0.0.0
port 6379
protected-mode yes

# General
daemonize no
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile ""

# Snapshotting (RDB)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Replication
replica-serve-stale-data yes
replica-read-only yes

# Security
# IMPORTANT: requirepass MUST be set via command line or environment.
# If REDIS_PASSWORD is not set, Redis will refuse to start for safety.
# For Docker: command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
# If running without Docker, set requirepass below:
# requirepass CHANGE_ME_IN_PRODUCTION

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command KEYS ""

# Limits
maxclients 10000
# Memory limit — override via: redis-server --maxmemory 512mb
maxmemory 256mb
maxmemory-policy allkeys-lru

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow log (10000 microseconds = 10 milliseconds)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Memory management
activedefrag yes
