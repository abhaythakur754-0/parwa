# MCP Server Deployment: Model Context Protocol servers
# 2 replicas for high availability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parwa-mcp
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: parwa-platform
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: parwa
      app.kubernetes.io/component: mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parwa
        app.kubernetes.io/component: mcp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: parwa-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        # Knowledge MCP Server
        - name: knowledge-mcp
          image: parwa/mcp-knowledge:latest
          imagePullPolicy: Always
          ports:
            - name: knowledge
              containerPort: 8001
              protocol: TCP
          env:
            - name: MCP_SERVER_NAME
              value: "knowledge"
            - name: MCP_PORT
              value: "8001"
          envFrom:
            - configMapRef:
                name: parwa-config
            - secretRef:
                name: parwa-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: knowledge
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: knowledge
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mcp-cache
              mountPath: /var/cache/mcp

        # Analytics MCP Server
        - name: analytics-mcp
          image: parwa/mcp-analytics:latest
          imagePullPolicy: Always
          ports:
            - name: analytics
              containerPort: 8002
              protocol: TCP
          env:
            - name: MCP_SERVER_NAME
              value: "analytics"
            - name: MCP_PORT
              value: "8002"
          envFrom:
            - configMapRef:
                name: parwa-config
            - secretRef:
                name: parwa-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: analytics
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: analytics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mcp-cache
              mountPath: /var/cache/mcp

        # Actions MCP Server
        - name: actions-mcp
          image: parwa/mcp-actions:latest
          imagePullPolicy: Always
          ports:
            - name: actions
              containerPort: 8003
              protocol: TCP
          env:
            - name: MCP_SERVER_NAME
              value: "actions"
            - name: MCP_PORT
              value: "8003"
          envFrom:
            - configMapRef:
                name: parwa-config
            - secretRef:
                name: parwa-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: actions
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: actions
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mcp-cache
              mountPath: /var/cache/mcp

      volumes:
        - name: mcp-cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: parwa
                    app.kubernetes.io/component: mcp
                topologyKey: kubernetes.io/hostname

---
# MCP Service
apiVersion: v1
kind: Service
metadata:
  name: parwa-mcp
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: mcp
spec:
  type: ClusterIP
  ports:
    - name: knowledge
      port: 8001
      targetPort: knowledge
      protocol: TCP
    - name: analytics
      port: 8002
      targetPort: analytics
      protocol: TCP
    - name: actions
      port: 8003
      targetPort: actions
      protocol: TCP
  selector:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: mcp

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: parwa-mcp-hpa
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: mcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-mcp
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: parwa-mcp-pdb
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: mcp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: parwa
      app.kubernetes.io/component: mcp

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: parwa-mcp
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: mcp
automountServiceAccountToken: false
