apiVersion: apps/v1
kind: Deployment
metadata:
  name: parwa-celery-worker
  namespace: parwa
  labels:
    app: parwa-celery-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parwa-celery-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: parwa-celery-worker
        component: worker
    spec:
      containers:
        - name: celery-worker
          image: {{ECR_REGISTRY}}/parwa-backend:latest
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - --max-tasks-per-child=1000
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: parwa-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: parwa-config
                  key: LOG_LEVEL
            - name: CELERY_BROKER_URL
              value: "redis://parwa-redis.parwa.svc.cluster.local:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://parwa-redis.parwa.svc.cluster.local:6379/1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: parwa-backend-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: parwa-backend-secrets
                  key: secret-key
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: parwa-celery-worker
