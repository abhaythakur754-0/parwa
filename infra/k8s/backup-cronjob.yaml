apiVersion: batch/v1
kind: CronJob
metadata:
  name: parwa-backup
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: parwa-platform
spec:
  schedule: "0 */6 * * *"   # Every 6 hours
  concurrencyPolicy: Forbid  # Prevent overlapping backups
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800  # 30 min timeout
      template:
        spec:
          serviceAccountName: parwa-backend
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: backup
              image: parwa/backend:v1.0.0
              imagePullPolicy: Always
              command:
                - /bin/bash
                - -c
                - |
                  # Run pg_dump backup
                  pg_dump "${DATABASE_URL}" --format=custom --compress=6 \
                    --no-owner --no-acl > /backups/parwa_$(date +%Y%m%d_%H%M%S).dump
                  # Verify backup integrity
                  pg_restore --list /backups/parwa_$(date +%Y%m%d_%H%M%S).dump > /dev/null
                  # Upload to S3 if configured
                  if [ -n "${S3_BUCKET:-}" ]; then
                    aws s3 cp /backups/ s3://${S3_BUCKET}/parwa-backups/ --recursive
                  fi
                  # Cleanup old local backups (keep last 5)
                  ls -t /backups/*.dump | tail -n +6 | xargs -r rm -f
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: parwa-secrets
                      key: DATABASE_URL
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: parwa-config
                      key: BACKUP_S3_BUCKET
                      optional: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: backup-pvc
