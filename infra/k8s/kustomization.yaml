apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: parwa

commonLabels:
  app.kubernetes.io/part-of: parwa-platform
  app.kubernetes.io/managed-by: kustomize

resources:
  # Namespace
  - namespace.yaml

  # Configuration
  - configmap.yaml
  - secrets.yaml

  # Database
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - postgres/pvc.yaml

  # Cache
  - redis/statefulset.yaml
  - redis/service.yaml
  - redis/pvc.yaml

  # Application
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/hpa.yaml
  - worker/deployment.yaml
  - worker/hpa.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - mcp/deployment.yaml
  - mcp/service.yaml

  # Monitoring
  - monitoring/prometheus/deployment.yaml
  - monitoring/prometheus/service.yaml
  - monitoring/prometheus/configmap.yaml
  - monitoring/grafana/deployment.yaml
  - monitoring/grafana/service.yaml
  - monitoring/alertmanager/deployment.yaml
  - monitoring/alertmanager/service.yaml

  # Networking
  - ingress.yaml
  - networkpolicy.yaml
  - pdb.yaml
