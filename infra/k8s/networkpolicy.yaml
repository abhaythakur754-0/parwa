apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-netpol
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: networking
    app.kubernetes.io/part-of: parwa-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: monitoring
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller (Grafana UI)
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 9093
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow to all pods in namespace for scraping
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: parwa
    # Allow to alertmanager
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - port: 9093
          protocol: TCP
---
# Default deny all network policy — no external access except via Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: networking
    app.kubernetes.io/part-of: parwa-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Allow DNS resolution for all pods
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
