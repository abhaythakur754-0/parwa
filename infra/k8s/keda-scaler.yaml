# KEDA Scalers for PARWA Workers
# Scales workers based on queue depth (Redis, RabbitMQ, Kafka)
# Enables event-driven autoscaling for background task processing

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: parwa-worker-scaler
  namespace: parwa
  labels:
    app: parwa-worker
    component: keda
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-worker
  
  pollingInterval: 15  # Check queue every 15 seconds
  cooldownPeriod: 300  # Wait 5 minutes before scaling down
  minReplicaCount: 1
  maxReplicaCount: 20
  
  # Advanced scaling
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Percent
              value: 200
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 10
              periodSeconds: 60
  
  triggers:
    # Redis queue depth trigger (primary)
    - type: redis
      metadata:
        host: redis-master.parwa.svc.cluster.local
        port: "6379"
        listName: "parwa:tasks:pending"
        listLength: "100"  # Scale when >100 items in queue
        enableTLS: "false"
      authenticationRef:
        name: redis-auth
    
    # Prometheus custom metric trigger
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.parwa.svc.cluster.local:9090
        metricName: parwa_queue_depth
        threshold: "50"
        query: |
          sum(parwa_queue_pending_tasks_total{namespace="parwa"})

---
# KEDA Scaler for MCP Worker Queue
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: parwa-mcp-worker-scaler
  namespace: parwa
  labels:
    app: parwa-mcp-worker
    component: keda
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-mcp-worker
  
  pollingInterval: 10
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 10
  
  triggers:
    - type: redis
      metadata:
        host: redis-master.parwa.svc.cluster.local
        port: "6379"
        listName: "parwa:mcp:pending"
        listLength: "50"
      authenticationRef:
        name: redis-auth

---
# Redis Authentication Secret for KEDA
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
  namespace: parwa
type: Opaque
data:
  # Base64 encoded password (use actual password in production)
  password: cGFyd2EtcmVkaXMtc2VjcmV0

---
# KEDA TriggerAuthentication
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: redis-auth
  namespace: parwa
spec:
  secretTargetRef:
    - parameter: password
      name: redis-auth
      key: password

---
# KEDA Scaler for Kafka Consumer Groups
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: parwa-kafka-scaler
  namespace: parwa
  labels:
    app: parwa-kafka-consumer
    component: keda
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-kafka-consumer
  
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.parwa.svc.cluster.local:9092
        consumerGroup: parwa-events-group
        topic: parwa-events
        lagThreshold: "100"
