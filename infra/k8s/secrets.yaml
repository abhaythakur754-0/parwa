# Secrets Template: parwa-secrets
# This is a TEMPLATE for External Secrets Operator
# DO NOT store actual secrets here - use External Secrets Operator or Sealed Secrets
#
# Usage:
# 1. External Secrets Operator: Reference this template with your secret store (AWS Secrets Manager, HashiCorp Vault, etc.)
# 2. Sealed Secrets: Encrypt this with kubeseal before applying
# 3. For local dev: Use .env files (never commit actual secrets)
#
---
apiVersion: v1
kind: Secret
metadata:
  name: parwa-secrets
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: secrets
  annotations:
    # External Secrets Operator reference
    # external-secrets.io/provider: aws-secretsmanager
    # external-secrets.io/secret-name: parwa/production
type: Opaque
# PLACEHOLDER VALUES - Replace with actual secrets via External Secrets Operator
# Base64 encoded values shown as examples
stringData:
  # Database credentials
  DATABASE_URL: "postgresql://parwa:REPLACE_ME@postgres:5432/parwa?sslmode=require"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "parwa"
  DB_USER: "parwa"
  DB_PASSWORD: "REPLACE_ME"

  # Redis credentials
  REDIS_URL: "redis://:REPLACE_ME@redis:6379/0"
  REDIS_PASSWORD: "REPLACE_ME"

  # Supabase credentials
  SUPABASE_URL: "https://REPLACE_ME.supabase.co"
  SUPABASE_ANON_KEY: "REPLACE_ME"
  SUPABASE_SERVICE_KEY: "REPLACE_ME"

  # OpenAI / AI API keys
  OPENAI_API_KEY: "REPLACE_ME"

  # Paddle (payments)
  PADDLE_VENDOR_ID: "REPLACE_ME"
  PADDLE_API_KEY: "REPLACE_ME"
  PADDLE_PUBLIC_KEY: "REPLACE_ME"

  # JWT secrets
  JWT_SECRET: "REPLACE_ME"
  JWT_REFRESH_SECRET: "REPLACE_ME"

  # Encryption keys
  ENCRYPTION_KEY: "REPLACE_ME"

  # OAuth providers
  GOOGLE_CLIENT_ID: "REPLACE_ME"
  GOOGLE_CLIENT_SECRET: "REPLACE_ME"

  # Webhook secrets
  WEBHOOK_SECRET: "REPLACE_ME"

  # Slack integration
  SLACK_BOT_TOKEN: "REPLACE_ME"
  SLACK_SIGNING_SECRET: "REPLACE_ME"

---
# Secret: parwa-tls
# TLS certificates (use cert-manager for production)
apiVersion: v1
kind: Secret
metadata:
  name: parwa-tls
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: tls
  annotations:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
type: kubernetes.io/tls
# PLACEHOLDER - Use cert-manager for automatic certificate management
data:
  tls.crt: ""  # Base64 encoded certificate
  tls.key: ""  # Base64 encoded private key

---
