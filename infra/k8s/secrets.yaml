apiVersion: v1
kind: Secret
metadata:
  name: parwa-secrets
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: configuration
    app.kubernetes.io/part-of: parwa-platform
type: Opaque
stringData:
  # ⚠️  TEMPLATE — Replace values before deploying to production
  # Use: kubectl create secret generic parwa-secrets --from-literal=...
  # Or: Sealed Secrets / External Secrets Operator / Vault integration

  # Database
  POSTGRES_USER: "parwa"
  DB_PASSWORD: "CHANGE_ME_STRONG_DB_PASSWORD"

  # Redis
  REDIS_PASSWORD: "CHANGE_ME_STRONG_REDIS_PASSWORD"

  # Application
  SECRET_KEY: "CHANGE_ME_RANDOM_SECRET_KEY_64_CHARS"
  JWT_SECRET_KEY: "CHANGE_ME_RANDOM_JWT_SECRET_64_CHARS"
  DATA_ENCRYPTION_KEY: "CHANGE_ME_FERNET_KEY"

  # Connection strings (derived)
  DATABASE_URL: "postgresql://parwa:CHANGE_ME_STRONG_DB_PASSWORD@postgres-svc:5432/parwa_db"
  REDIS_URL: "redis://:CHANGE_ME_STRONG_REDIS_PASSWORD@redis-svc:6379/0"
  CELERY_BROKER_URL: "redis://:CHANGE_ME_STRONG_REDIS_PASSWORD@redis-svc:6379/1"
  CELERY_RESULT_BACKEND: "redis://:CHANGE_ME_STRONG_REDIS_PASSWORD@redis-svc:6379/2"

  # Third-party integrations
  PADDLE_API_KEY: "CHANGE_ME_PADDLE_API_KEY"
  PADDLE_WEBHOOK_SECRET: "CHANGE_ME_PADDLE_WEBHOOK_SECRET"
  TWILIO_ACCOUNT_SID: "CHANGE_ME_TWILIO_SID"
  TWILIO_AUTH_TOKEN: "CHANGE_ME_TWILIO_TOKEN"

  # Grafana
  GRAFANA_ADMIN_USER: "admin"
  GRAFANA_ADMIN_PASSWORD: "CHANGE_ME_GRAFANA_ADMIN_PASSWORD"

  # Slack notifications
  SLACK_WEBHOOK: "CHANGE_ME_SLACK_WEBHOOK_URL"

  # Grafana
  GRAFANA_ADMIN_USER: "admin"
  GRAFANA_ADMIN_PASSWORD: "CHANGE_ME_GRAFANA_ADMIN_PASSWORD"
