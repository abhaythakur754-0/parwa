apiVersion: v1
kind: ConfigMap
metadata:
  name: parwa-config
  namespace: parwa
  labels:
    app.kubernetes.io/part-of: parwa
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  CORS_ALLOWED_ORIGINS: "https://parwa.ai"
  ALLOWED_HOSTS: "parwa.ai,api.parwa.ai"
  CACHE_DEFAULT_TIMEOUT: "300"
  CELERY_TASK_ALWAYS_EAGER: "false"
  CELERY_TASK_EAGER_PROPAGATES: "false"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"
