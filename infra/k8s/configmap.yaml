# ConfigMap: parwa-application
# Application configuration (non-sensitive)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: parwa-config
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: configmap
    app.kubernetes.io/part-of: parwa-platform
data:
  # Application settings
  APP_NAME: "parwa"
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_LEVEL: "INFO"

  # Backend settings
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  BACKEND_WORKERS: "4"
  BACKEND_TIMEOUT: "120"

  # Frontend settings
  NEXT_PUBLIC_APP_NAME: "PARWA"
  NEXT_PUBLIC_APP_URL: "https://app.parwa.ai"
  NEXT_PUBLIC_API_URL: "https://api.parwa.ai"

  # Database settings (connection pool)
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"

  # Redis settings
  REDIS_MAX_CONNECTIONS: "50"
  REDIS_TIMEOUT: "5"

  # Jarvis AI settings
  JARVIS_MODEL: "gpt-4-turbo"
  JARVIS_MAX_TOKENS: "4096"
  JARVIS_TEMPERATURE: "0.7"

  # Agent settings
  AGENT_MAX_CONCURRENT: "10"
  AGENT_TIMEOUT: "300"
  AGENT_RETRY_COUNT: "3"

  # Feature flags
  FEATURE_ANALYTICS_ENABLED: "true"
  FEATURE_JARVIS_ENABLED: "true"
  FEATURE_APPROVALS_ENABLED: "true"
  FEATURE_WEBHOOKS_ENABLED: "true"
  FEATURE_MULTI_TENANT: "true"

  # Monitoring
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.1"

  # Security
  CORS_ORIGINS: "https://app.parwa.ai,https://parwa.ai"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"

---
# ConfigMap: parwa-nginx-config
# Nginx configuration for frontend
apiVersion: v1
kind: ConfigMap
metadata:
  name: parwa-nginx-config
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: nginx-config
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        server {
            listen 3000;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;

            # Cache static assets
            location /_next/static {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # Cache images
            location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
                expires 30d;
                add_header Cache-Control "public";
            }

            # SPA fallback
            location / {
                try_files $uri $uri/ /index.html;
            }

            # Health check
            location /health {
                access_log off;
                return 200 "OK";
                add_header Content-Type text/plain;
            }
        }
    }

---
# ConfigMap: parwa-feature-flags
# Feature flags configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: parwa-feature-flags
  namespace: parwa
  labels:
    app.kubernetes.io/name: parwa
    app.kubernetes.io/component: feature-flags
data:
  features.json: |
    {
      "variants": {
        "mini": {
          "enabled": true,
          "max_tickets": 500,
          "channels": ["email"]
        },
        "junior": {
          "enabled": true,
          "max_tickets": 2000,
          "channels": ["email", "chat"]
        },
        "senior": {
          "enabled": true,
          "max_tickets": 10000,
          "channels": ["email", "chat", "voice", "sms"]
        }
      },
      "experimental": {
        "ai_suggestions": false,
        "auto_categorization": true,
        "smart_routing": true
      },
      "limits": {
        "rate_limit_per_minute": 100,
        "max_file_upload_mb": 10,
        "max_team_members": 50
      }
    }
