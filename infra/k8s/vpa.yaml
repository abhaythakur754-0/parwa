# Vertical Pod Autoscaler (VPA) for PARWA
# Automatically adjusts resource requests/limits based on usage
# Works alongside HPA for optimal resource utilization

apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: parwa-backend-vpa
  namespace: parwa
  labels:
    app: parwa-backend
    component: autoscaling
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-backend
  
  # Update mode: Auto applies recommendations automatically
  updatePolicy:
    updateMode: Auto
  
  # Resource policy for fine-grained control
  resourcePolicy:
    containerPolicies:
      - containerName: parwa-backend
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: 4000m
          memory: 8Gi
        controlledResources:
          - cpu
          - memory
        controlledValues: RequestsAndLimits

---
# VPA for MCP Servers
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: parwa-mcp-vpa
  namespace: parwa
  labels:
    app: parwa-mcp
    component: autoscaling
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-mcp
  
  updatePolicy:
    updateMode: Auto
  
  resourcePolicy:
    containerPolicies:
      - containerName: parwa-mcp
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: 2000m
          memory: 4Gi

---
# VPA for Workers
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: parwa-worker-vpa
  namespace: parwa
  labels:
    app: parwa-worker
    component: autoscaling
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-worker
  
  updatePolicy:
    updateMode: Auto
  
  resourcePolicy:
    containerPolicies:
      - containerName: parwa-worker
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 2000m
          memory: 4Gi

---
# VPA for Frontend
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: parwa-frontend-vpa
  namespace: parwa
  labels:
    app: parwa-frontend
    component: autoscaling
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-frontend
  
  updatePolicy:
    updateMode: Auto
  
  resourcePolicy:
    containerPolicies:
      - containerName: parwa-frontend
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 1000m
          memory: 2Gi

---
# VPA Recommender (for recommendations only mode)
# Set updateMode to Off to see recommendations without applying them
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: parwa-pgbouncer-vpa
  namespace: parwa
  labels:
    app: pgbouncer
    component: autoscaling
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pgbouncer
  
  updatePolicy:
    updateMode: Auto
  
  resourcePolicy:
    containerPolicies:
      - containerName: pgbouncer
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
