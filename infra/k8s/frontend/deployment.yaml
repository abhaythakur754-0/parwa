apiVersion: apps/v1
kind: Deployment
metadata:
  name: parwa-frontend
  namespace: parwa
  labels:
    app: parwa-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parwa-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: parwa-frontend
        component: frontend
    spec:
      containers:
        - name: frontend
          image: {{ECR_REGISTRY}}/parwa-frontend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://parwa.ai"
            - name: NEXT_PUBLIC_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
