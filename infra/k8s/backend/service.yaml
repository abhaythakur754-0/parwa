apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: parwa
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: parwa-platform
spec:
  type: ClusterIP
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
