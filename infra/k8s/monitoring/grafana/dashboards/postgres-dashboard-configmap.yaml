apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-postgres
  namespace: parwa
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: parwa-platform
data:
  postgres-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "title": "PostgreSQL Connections",
          "type": "timeseries",
          "targets": [
            { "expr": "pg_stat_activity_count", "legendFormat": "{{ datname }} / {{ state }}", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "title": "PostgreSQL Transactions",
          "type": "timeseries",
          "targets": [
            { "expr": "rate(pg_stat_database_xact_commit[5m])", "legendFormat": "{{ datname }} commits/s", "refId": "A" },
            { "expr": "rate(pg_stat_database_xact_rollback[5m])", "legendFormat": "{{ datname }} rollbacks/s", "refId": "B" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "bytes" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "title": "PostgreSQL Replication Lag",
          "type": "timeseries",
          "targets": [
            { "expr": "pg_replication_lag_bytes", "legendFormat": "{{ client_addr }}", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "title": "PostgreSQL Vacuum Stats",
          "type": "stat",
          "targets": [
            { "expr": "pg_stat_user_tables_n_live_tup", "legendFormat": "{{ relname }} live", "refId": "A" },
            { "expr": "pg_stat_user_tables_n_dead_tup", "legendFormat": "{{ relname }} dead", "refId": "B" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "percentunit" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 5,
          "title": "PostgreSQL Bloat",
          "type": "gauge",
          "targets": [
            { "expr": "pg_stat_user_tables_n_dead_tup / (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup)", "legendFormat": "{{ relname }} bloat", "refId": "A" }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["postgres", "parwa", "database"],
      "templating": { "list": [{ "current": {}, "hide": 0, "name": "DS_PROMETHEUS", "options": [], "query": "prometheus", "refresh": 1, "regex": "", "type": "datasource" }] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Parwa PostgreSQL",
      "uid": "parwa-postgres",
      "version": 1
    }
