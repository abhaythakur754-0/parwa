apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nginx
  namespace: parwa
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: parwa-platform
data:
  nginx-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "title": "Nginx Request Rate",
          "type": "timeseries",
          "targets": [
            { "expr": "rate(nginx_http_requests_total[5m])", "legendFormat": "Total", "refId": "A" },
            { "expr": "rate(nginx_http_requests_total{status=~\"2..\"}[5m])", "legendFormat": "2xx", "refId": "B" },
            { "expr": "rate(nginx_http_requests_total{status=~\"4..\"}[5m])", "legendFormat": "4xx", "refId": "C" },
            { "expr": "rate(nginx_http_requests_total{status=~\"5..\"}[5m])", "legendFormat": "5xx", "refId": "D" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "s" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "title": "Nginx Upstream Latency",
          "type": "timeseries",
          "targets": [
            { "expr": "histogram_quantile(0.5, rate(nginx_http_upstream_connect_time_seconds_bucket[5m]))", "legendFormat": "p50 connect", "refId": "A" },
            { "expr": "histogram_quantile(0.95, rate(nginx_http_upstream_connect_time_seconds_bucket[5m]))", "legendFormat": "p95 connect", "refId": "B" },
            { "expr": "histogram_quantile(0.99, rate(nginx_http_upstream_connect_time_seconds_bucket[5m]))", "legendFormat": "p99 connect", "refId": "C" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" } },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "title": "Nginx Error Rates by Path",
          "type": "timeseries",
          "targets": [
            { "expr": "rate(nginx_http_requests_total{status=~\"5..\"}[5m])", "legendFormat": "{{ path }}", "refId": "A" }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["nginx", "parwa", "infrastructure"],
      "templating": { "list": [{ "current": {}, "hide": 0, "name": "DS_PROMETHEUS", "options": [], "query": "prometheus", "refresh": 1, "regex": "", "type": "datasource" }] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Parwa Nginx",
      "uid": "parwa-nginx",
      "version": 1
    }
