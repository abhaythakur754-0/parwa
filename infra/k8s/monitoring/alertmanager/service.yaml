apiVersion: v1
kind: Service
metadata:
  name: alertmanager-svc
  namespace: parwa
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: parwa-platform
spec:
  type: ClusterIP
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
      app.kubernetes.io/component: monitoring
  ports:
    - name: http
      port: 9093
      targetPort: http
      protocol: TCP
