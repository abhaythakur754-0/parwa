apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: parwa
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: parwa-platform
spec:
  maxUnavailable: 1                    # #59: changed from minAvailable to maxUnavailable
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
---
