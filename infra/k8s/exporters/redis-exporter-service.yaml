apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: parwa
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: parwa-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/component: monitoring
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
      protocol: TCP
