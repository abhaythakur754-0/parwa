# Performance Alert Rules for PARWA
# Prometheus alerting rules for performance monitoring
#
# Usage:
#   kubectl apply -f performance_alerts.yml -n monitoring
#   Or add to Prometheus config: rule_files:
#     - /etc/prometheus/rules/performance_alerts.yml

groups:
  # ==================== API Performance Alerts ====================
  - name: parwa_api_performance
    interval: 30s
    rules:
      # CRITICAL: P95 latency > 500ms
      - alert: P95LatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{namespace="parwa"}[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: critical
          category: performance
          team: platform
        annotations:
          summary: "P95 latency exceeds 500ms SLA"
          description: "P95 latency is {{ $value | humanizeDuration }}, exceeding the 500ms SLA threshold. Immediate investigation required."
          runbook_url: "https://docs.parwa.ai/runbooks/high-latency"
          dashboard_url: "https://grafana.parwa.ai/d/performance"

      # WARNING: P95 latency > 300ms
      - alert: P95LatencyWarning
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{namespace="parwa"}[5m])) by (le)
          ) > 0.3
        for: 10m
        labels:
          severity: warning
          category: performance
          team: platform
        annotations:
          summary: "P95 latency elevated above 300ms"
          description: "P95 latency is {{ $value | humanizeDuration }}. May indicate upcoming performance issues."

      # CRITICAL: Error rate > 1%
      - alert: ErrorRateHigh
        expr: |
          sum(rate(http_requests_total{namespace="parwa", status=~"5.."}[5m])) /
          sum(rate(http_requests_total{namespace="parwa"}[5m])) > 0.01
        for: 5m
        labels:
          severity: critical
          category: availability
          team: platform
        annotations:
          summary: "Error rate exceeds 1%"
          description: "Error rate is {{ $value | humanizePercentage }}. This exceeds the 1% threshold and affects user experience."
          runbook_url: "https://docs.parwa.ai/runbooks/high-error-rate"

      # WARNING: Error rate > 0.5%
      - alert: ErrorRateWarning
        expr: |
          sum(rate(http_requests_total{namespace="parwa", status=~"5.."}[5m])) /
          sum(rate(http_requests_total{namespace="parwa"}[5m])) > 0.005
        for: 10m
        labels:
          severity: warning
          category: availability
          team: platform
        annotations:
          summary: "Error rate elevated above 0.5%"
          description: "Error rate is {{ $value | humanizePercentage }}. Monitor closely."

      # Request rate drop
      - alert: RequestRateDrop
        expr: |
          (
            sum(rate(http_requests_total{namespace="parwa"}[5m])) -
            sum(rate(http_requests_total{namespace="parwa"}[5m] offset 1h))
          ) / sum(rate(http_requests_total{namespace="parwa"}[5m] offset 1h)) < -0.5
        for: 15m
        labels:
          severity: warning
          category: traffic
          team: platform
        annotations:
          summary: "Request rate dropped by more than 50%"
          description: "Traffic has dropped significantly. May indicate service issues or external factors."

  # ==================== Database Performance Alerts ====================
  - name: parwa_database_performance
    interval: 30s
    rules:
      # CRITICAL: Database connection pool exhausted
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.9
        for: 5m
        labels:
          severity: critical
          category: database
          team: platform
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Using {{ $value | humanizePercentage }} of max connections. Increase pool size or investigate connection leaks."
          runbook_url: "https://docs.parwa.ai/runbooks/db-connection-pool"

      # WARNING: High database connection count
      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count > 150
        for: 10m
        labels:
          severity: warning
          category: database
          team: platform
        annotations:
          summary: "Database connection count high"
          description: "{{ $value }} active connections. Normal load should be under 150."

      # CRITICAL: Slow database queries
      - alert: SlowDatabaseQueries
        expr: |
          rate(pg_stat_statements_mean_exec_time_seconds[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          category: database
          team: platform
        annotations:
          summary: "Slow database queries detected"
          description: "Average query execution time is {{ $value | humanizeDuration }}. Review query performance."

      # Database replication lag
      - alert: DatabaseReplicationLag
        expr: pg_replication_lag_seconds > 10
        for: 5m
        labels:
          severity: critical
          category: database
          team: platform
        annotations:
          summary: "Database replication lag is high"
          description: "Replication lag is {{ $value | humanizeDuration }}. This affects read consistency."

  # ==================== Cache Performance Alerts ====================
  - name: parwa_cache_performance
    interval: 30s
    rules:
      # WARNING: Low cache hit rate
      - alert: CacheHitRateLow
        expr: |
          rate(redis_keyspace_hits_total[5m]) /
          (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) < 0.7
        for: 10m
        labels:
          severity: warning
          category: cache
          team: platform
        annotations:
          summary: "Cache hit rate below 70%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}. Consider reviewing caching strategy."

      # CRITICAL: Redis memory high
      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: critical
          category: cache
          team: platform
        annotations:
          summary: "Redis memory usage above 85%"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory. Increase memory or clear stale keys."

      # WARNING: Redis connection count
      - alert: RedisConnectionsHigh
        expr: redis_connected_clients > 80
        for: 10m
        labels:
          severity: warning
          category: cache
          team: platform
        annotations:
          summary: "Redis client connections high"
          description: "{{ $value }} clients connected to Redis. Normal load is under 80."

      # CRITICAL: Queue backlog
      - alert: QueueBacklogHigh
        expr: redis_llen{queue="arq:queue"} > 1000
        for: 10m
        labels:
          severity: critical
          category: queue
          team: platform
        annotations:
          summary: "Task queue backlog exceeds 1000"
          description: "{{ $value }} tasks in queue. Workers may be overloaded or stuck."
          runbook_url: "https://docs.parwa.ai/runbooks/queue-backlog"

  # ==================== Resource Utilization Alerts ====================
  - name: parwa_resource_utilization
    interval: 30s
    rules:
      # CRITICAL: High CPU usage
      - alert: HighCPUUsage
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="parwa"}[5m])) by (pod) /
          sum(container_spec_cpu_quota{namespace="parwa"} / container_spec_cpu_period{namespace="parwa"}) by (pod) > 0.9
        for: 10m
        labels:
          severity: critical
          category: resources
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} CPU usage above 90%"
          description: "CPU usage is {{ $value | humanizePercentage }}. Consider scaling or optimizing."

      # CRITICAL: High memory usage
      - alert: HighMemoryUsage
        expr: |
          sum(container_memory_usage_bytes{namespace="parwa"}) by (pod) /
          sum(container_spec_memory_limit_bytes{namespace="parwa"}) by (pod) > 0.85
        for: 10m
        labels:
          severity: critical
          category: resources
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} memory usage above 85%"
          description: "Memory usage is {{ $value | humanizePercentage }}. May experience OOM soon."

      # WARNING: Memory usage trend
      - alert: MemoryUsageTrend
        expr: |
          predict_linear(container_memory_usage_bytes{namespace="parwa"}[1h], 4*3600) >
          container_spec_memory_limit_bytes{namespace="parwa"}
        for: 30m
        labels:
          severity: warning
          category: resources
          team: platform
        annotations:
          summary: "Memory exhaustion predicted within 4 hours"
          description: "Based on current trend, {{ $labels.pod }} will exhaust memory in ~4 hours."

      # Pod restart loops
      - alert: PodRestartLoop
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="parwa"}[1h]) > 3
        for: 5m
        labels:
          severity: critical
          category: availability
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is in restart loop"
          description: "Container has restarted {{ $value }} times in the last hour. Check logs for crash cause."

  # ==================== Client-Specific Alerts ====================
  - name: parwa_client_alerts
    interval: 30s
    rules:
      # Per-client error rate
      - alert: ClientHighErrorRate
        expr: |
          sum(rate(http_requests_total{namespace="parwa", status=~"5..", client_id!=""}[5m])) by (client_id) /
          sum(rate(http_requests_total{namespace="parwa", client_id!=""}[5m])) by (client_id) > 0.05
        for: 10m
        labels:
          severity: warning
          category: client
          team: platform
        annotations:
          summary: "Client {{ $labels.client_id }} experiencing high error rate"
          description: "Error rate for this client is {{ $value | humanizePercentage }}. Investigate client-specific issues."

      # Client accuracy below threshold
      - alert: ClientAccuracyLow
        expr: parwa_client_accuracy_ratio < 0.72
        for: 1h
        labels:
          severity: warning
          category: ai
          team: ai
        annotations:
          summary: "Client {{ $labels.client_id }} accuracy below 72%"
          description: "AI accuracy for this client is {{ $value | humanizePercentage }}. May need knowledge base update."

      # Client ticket volume spike
      - alert: ClientTicketVolumeSpike
        expr: |
          (
            sum(rate(parwa_tickets_created_total{namespace="parwa"}[5m])) by (client_id) -
            sum(rate(parwa_tickets_created_total{namespace="parwa"}[5m] offset 1h])) by (client_id)
          ) / sum(rate(parwa_tickets_created_total{namespace="parwa"}[5m] offset 1h])) by (client_id) > 2
        for: 15m
        labels:
          severity: warning
          category: traffic
          team: platform
        annotations:
          summary: "Client {{ $labels.client_id }} ticket volume spiked"
          description: "Ticket creation rate increased by more than 200%. Check for campaigns or incidents."

  # ==================== Jarvis AI Alerts ====================
  - name: parwa_jarvis_performance
    interval: 30s
    rules:
      # Jarvis response time
      - alert: JarvisResponseSlow
        expr: |
          histogram_quantile(0.95,
            sum(rate(jarvis_response_duration_seconds_bucket{namespace="parwa"}[5m])) by (le)
          ) > 5
        for: 10m
        labels:
          severity: warning
          category: ai
          team: ai
        annotations:
          summary: "Jarvis P95 response time exceeds 5 seconds"
          description: "Jarvis AI is responding slowly. May affect user experience. Check OpenAI API status."

      # Jarvis error rate
      - alert: JarvisErrorRate
        expr: |
          sum(rate(jarvis_errors_total{namespace="parwa"}[5m])) /
          sum(rate(jarvis_requests_total{namespace="parwa"}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          category: ai
          team: ai
        annotations:
          summary: "Jarvis error rate exceeds 5%"
          description: "Jarvis is failing {{ $value | humanizePercentage }} of requests. Check API keys and rate limits."

  # ==================== Approval Workflow Alerts ====================
  - name: parwa_approval_alerts
    interval: 30s
    rules:
      # Pending approvals backlog
      - alert: ApprovalsBacklog
        expr: parwa_approvals_pending_count > 50
        for: 30m
        labels:
          severity: warning
          category: workflow
          team: platform
        annotations:
          summary: "Pending approvals backlog exceeds 50"
          description: "{{ $value }} approvals waiting for review. May need additional reviewers."

      # Approval processing time
      - alert: ApprovalProcessingSlow
        expr: |
          histogram_quantile(0.95,
            sum(rate(approval_processing_duration_seconds_bucket{namespace="parwa"}[5m])) by (le)
          ) > 2
        for: 15m
        labels:
          severity: warning
          category: workflow
          team: platform
        annotations:
          summary: "Approval processing time exceeds 2 seconds"
          description: "Paddle API or internal processing may be slow."

  # ==================== SLO Compliance Alerts ====================
  - name: parwa_slo_alerts
    interval: 1m
    rules:
      # SLO: Availability burn rate
      - alert: SLOAvailabilityBurnRate
        expr: |
          (
            sum(rate(http_requests_total{namespace="parwa", status!~"5.."}[1h])) /
            sum(rate(http_requests_total{namespace="parwa"}[1h]))
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          category: slo
          team: platform
        annotations:
          summary: "Availability SLO burn rate exceeded"
          description: "Availability is {{ $value | humanizePercentage }}, below 99.9% SLO. Error budget being consumed rapidly."

      # SLO: Latency burn rate
      - alert: SLOLatencyBurnRate
        expr: |
          (
            sum(rate(http_request_duration_seconds_bucket{namespace="parwa", le="0.5"}[1h])) /
            sum(rate(http_request_duration_seconds_bucket{namespace="parwa", le="+Inf"}[1h]))
          ) < 0.95
        for: 5m
        labels:
          severity: critical
          category: slo
          team: platform
        annotations:
          summary: "Latency SLO burn rate exceeded"
          description: "Less than 95% of requests completing under 500ms. Latency SLO at risk."
