# PARWA Prometheus Alert Rules
# Alerting rules for service health monitoring

groups:
  # ─────────────────────────────────────────────────────────────────────────────
  # SERVICE AVAILABILITY ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: service_availability
    rules:
      # Service is down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_requests_total[5m])) by (job)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes."

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP SERVER ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: mcp_servers
    rules:
      # MCP Server response time
      - alert: MCPServerSlowResponse
        expr: |
          histogram_quantile(0.95, sum(rate(mcp_tool_call_duration_seconds_bucket[5m])) by (le, server_name))
          > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MCP Server {{ $labels.server_name }} slow response"
          description: "P95 response time is {{ $value }}s, exceeding 2s SLA."

      # MCP Server rate limit exceeded
      - alert: MCPRateLimitExceeded
        expr: rate(mcp_rate_limit_exceeded_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "MCP Server rate limit exceeded"
          description: "{{ $labels.server_name }} is rejecting requests due to rate limiting."

      # MCP Tool call failures
      - alert: MCPToolCallFailures
        expr: |
          sum(rate(mcp_tool_calls_total{success="false"}[5m])) by (server_name)
          /
          sum(rate(mcp_tool_calls_total[5m])) by (server_name)
          > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High MCP tool call failure rate"
          description: "{{ $labels.server_name }} has > 10% tool call failure rate."

  # ─────────────────────────────────────────────────────────────────────────────
  # GUARDRAILS ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: guardrails
    rules:
      # Hallucination detected
      - alert: HallucinationBlocked
        expr: rate(guardrails_hallucination_blocked_total[5m]) > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "AI hallucinations detected and blocked"
          description: "{{ $value }} hallucinations blocked in the last 5 minutes."

      # Competitor mentions blocked
      - alert: CompetitorMentionsBlocked
        expr: rate(guardrails_competitor_blocked_total[1h]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate of competitor mentions blocked"
          description: "{{ $value }} competitor mentions blocked per second."

      # PII exposure detected
      - alert: PIIExposureDetected
        expr: rate(guardrails_pii_detected_total[5m]) > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "PII exposure detected in AI outputs"
          description: "{{ $value }} PII exposures detected and masked."

      # Refund bypass attempts
      - alert: RefundBypassAttempt
        expr: increase(approval_bypass_attempts_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Refund bypass attempt blocked"
          description: "{{ $value }} refund bypass attempts blocked. Investigate immediately."

  # ─────────────────────────────────────────────────────────────────────────────
  # SLA ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: sla
    rules:
      # SLA breach prediction
      - alert: SLABreachPredicted
        expr: sla_breach_prediction_probability > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SLA breach predicted"
          description: "Ticket {{ $labels.ticket_id }} has {{ $value | humanizePercentage }} chance of SLA breach."

      # SLA breach occurred
      - alert: SLABreached
        expr: sla_status == 2  # BREACHED status
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "SLA breach occurred"
          description: "Ticket {{ $labels.ticket_id }} has breached SLA."

  # ─────────────────────────────────────────────────────────────────────────────
  # TRIVYA ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: trivya
    rules:
      # Low confidence responses
      - alert: LowConfidenceResponses
        expr: |
          sum(rate(trivya_response_confidence_bucket{le="0.7"}[15m]))
          /
          sum(rate(trivya_response_confidence_count[15m]))
          > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High rate of low confidence AI responses"
          description: "{{ $value | humanizePercentage }} of responses have < 70% confidence."

      # Tier 3 activations (high stakes)
      - alert: HighTier3Activation
        expr: rate(trivya_tier3_activations_total[1h]) > 5
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "High rate of Tier 3 TRIVYA activations"
          description: "{{ $value }} Tier 3 activations per second. May indicate complex issues."

  # ─────────────────────────────────────────────────────────────────────────────
  # GSD ENGINE ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: gsd_engine
    rules:
      # Context health issues
      - alert: ContextHealthDegraded
        expr: gsd_context_health_score < 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GSD context health degraded"
          description: "Context health score is {{ $value }} for conversation {{ $labels.conversation_id }}."

      # Compression rate too high
      - alert: HighCompressionRate
        expr: |
          rate(gsd_compressions_total[5m])
          /
          rate(gsd_messages_processed_total[5m])
          > 0.3
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "High compression rate"
          description: "{{ $value | humanizePercentage }} of messages are being compressed."

  # ─────────────────────────────────────────────────────────────────────────────
  # SYSTEM RESOURCE ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: system_resources
    rules:
      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes
          > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}."

      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
          > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%."

      # Disk space low
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})
          < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low"
          description: "Only {{ $value | humanizePercentage }} disk space remaining."
