# PARWA Grafana Configuration
# Configuration for Grafana monitoring dashboards

# ─────────────────────────────────────────────────────────────────────────────
# DATASOURCES
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: 1

datasources:
  # Prometheus - Primary metrics datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.45.0"
      cacheLevel: 'High'
      incrementalQuerying: true
      incrementalQueryOverlapWindow: 10m

  # PostgreSQL - For business metrics
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: parwa
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false

  # Redis - For real-time metrics
  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis://redis:6379
    jsonData:
      client: standalone
      poolSize: 5
      timeout: 10
      pingInterval: 0
      pipelineWindow: 0

# ─────────────────────────────────────────────────────────────────────────────
# DASHBOARD PROVISIONING
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: 1

providers:
  - name: 'PARWA Dashboards'
    orgId: 1
    folder: 'PARWA'
    folderUid: 'parwa-folder'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true

# ─────────────────────────────────────────────────────────────────────────────
# ALERT NOTIFICATION CHANNELS
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: 1

notifiers:
  # Slack notifications
  - name: Slack Alerts
    type: slack
    uid: slack-notifier
    is_default: true
    settings:
      url: ${SLACK_WEBHOOK_URL}
      recipient: "#parwa-alerts"
      username: PARWA Monitor
      icon_emoji: ':warning:'
    secure_settings:
      url: ${SLACK_WEBHOOK_URL}

  # Email notifications
  - name: Email Alerts
    type: email
    uid: email-notifier
    is_default: false
    settings:
      addresses: ${ALERT_EMAIL_ADDRESSES}
      singleEmail: false

  # PagerDuty for critical alerts
  - name: PagerDuty Critical
    type: pagerduty
    uid: pagerduty-notifier
    is_default: false
    settings:
      serviceKey: ${PAGERDUTY_SERVICE_KEY}
      severity: critical
    secure_settings:
      serviceKey: ${PAGERDUTY_SERVICE_KEY}

# ─────────────────────────────────────────────────────────────────────────────
# ALERT RULES CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: 1

alerting:
  rules:
    # Contact points for notifications
    contactPoints:
      - name: Default Contact
        receivers:
          - uid: default-receiver
            type: slack
            settings:
              url: ${SLACK_WEBHOOK_URL}
              channel: "#parwa-alerts"

    # Notification policies
    policies:
      - receiver: Default Contact
        group_by: ['alertname', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          # Critical alerts go to PagerDuty immediately
          - match:
              severity: critical
            receiver: PagerDuty Critical
            group_wait: 10s
            repeat_interval: 1h

          # Warning alerts go to Slack only
          - match:
              severity: warning
            receiver: Slack Alerts
            group_wait: 1m
            repeat_interval: 4h

          # Info alerts are logged only
          - match:
              severity: info
            receiver: Slack Alerts
            group_wait: 5m
            repeat_interval: 24h

# ─────────────────────────────────────────────────────────────────────────────
# GRAFANA SERVER SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: 1

server:
  http_addr: 0.0.0.0
  http_port: 3000
  domain: ${GRAFANA_DOMAIN:-localhost}
  root_url: ${GRAFANA_ROOT_URL:-http://localhost:3000}

security:
  admin_user: ${GRAFANA_ADMIN_USER:-admin}
  admin_password: ${GRAFANA_ADMIN_PASSWORD:-admin}
  secret_key: ${GRAFANA_SECRET_KEY}
  login_remember_days: 7
  cookie_secure: false
  cookie_samesite: lax
  disable_initial_admin_creation: false

# Anonymous access settings
auth:
  anonymous:
    enabled: ${GRAFANA_ANONYMOUS_ACCESS:-false}
    org_name: Main Org
    org_role: Viewer
  disable_login_form: false
  disable_signout_menu: false
  signout_redirect_url: ""

# Plugin settings
plugins:
  allow_loading_unsigned_plugins: ""
  enable_alpha: false

# Dashboard settings
dashboards:
  default_home_dashboard_path: /etc/grafana/provisioning/dashboards/main-dashboard.json
  versions_to_keep: 20

# Database settings (internal Grafana DB)
database:
  type: postgres
  host: postgres:5432
  name: grafana
  user: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}
  ssl_mode: disable
  max_open_conn: 10
  max_idle_conn: 5
  conn_max_lifetime: 14400

# Session settings
session:
  provider: redis
  provider_config: "addr=redis:6379,pool_size=100,db=0"
  cookie_name: grafana_session
  cookie_secure: false
  session_life_time: 86400
  gc_interval_time: 86400

# Remote cache
remote_cache:
  type: redis
  connstr: "addr=redis:6379,pool_size=100,db=1"

# Log settings
log:
  mode: console
  level: ${GRAFANA_LOG_LEVEL:-info}
  filters:
    alerting.notifier: warn
    alerting.scheduler: warn

# Metrics settings
metrics:
  enabled: true
  interval_seconds: 15
  basic_auth_username: ${GRAFANA_METRICS_USER:-}
  basic_auth_password: ${GRAFANA_METRICS_PASSWORD:-}

# Tracing settings
tracing:
  opentelemetry:
    address: ${OTEL_COLLECTOR_ADDR:-}
    propagation: w3c
