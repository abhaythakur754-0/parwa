# PARWA Prometheus Configuration
# Monitoring configuration for all MCP servers, backend API, and GSD engine
#
# This configuration is designed for local development and can be adapted
# for production deployments with appropriate service discovery.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'parwa-monitor'
    environment: 'development'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Rule files
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # ─────────────────────────────────────────────────────────────────────────────
  # PROMETHEUS SELF-MONITORING
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ─────────────────────────────────────────────────────────────────────────────
  # BACKEND API
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'parwa-backend-api'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true

  # ─────────────────────────────────────────────────────────────────────────────
  # GSD ENGINE (State Management)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'parwa-gsd-engine'
    static_configs:
      - targets: ['localhost:8001']
    metrics_path: /metrics
    scrape_interval: 10s
    labels:
      component: 'gsd-engine'

  # ─────────────────────────────────────────────────────────────────────────────
  # SMART ROUTER
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'parwa-smart-router'
    static_configs:
      - targets: ['localhost:8002']
    metrics_path: /metrics
    scrape_interval: 10s
    labels:
      component: 'smart-router'

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP KNOWLEDGE SERVERS (Day 1)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'mcp-faq-server'
    static_configs:
      - targets: ['localhost:5001']
    metrics_path: /metrics
    labels:
      server_type: 'knowledge'
      server_name: 'faq'

  - job_name: 'mcp-rag-server'
    static_configs:
      - targets: ['localhost:5002']
    metrics_path: /metrics
    labels:
      server_type: 'knowledge'
      server_name: 'rag'

  - job_name: 'mcp-kb-server'
    static_configs:
      - targets: ['localhost:5003']
    metrics_path: /metrics
    labels:
      server_type: 'knowledge'
      server_name: 'kb'

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP INTEGRATION SERVERS (Day 2)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'mcp-email-server'
    static_configs:
      - targets: ['localhost:5101']
    metrics_path: /metrics
    labels:
      server_type: 'integration'
      server_name: 'email'

  - job_name: 'mcp-voice-server'
    static_configs:
      - targets: ['localhost:5102']
    metrics_path: /metrics
    labels:
      server_type: 'integration'
      server_name: 'voice'

  - job_name: 'mcp-chat-server'
    static_configs:
      - targets: ['localhost:5103']
    metrics_path: /metrics
    labels:
      server_type: 'integration'
      server_name: 'chat'

  - job_name: 'mcp-ticketing-server'
    static_configs:
      - targets: ['localhost:5104']
    metrics_path: /metrics
    labels:
      server_type: 'integration'
      server_name: 'ticketing'

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP TOOL SERVERS (Day 4)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'mcp-notification-server'
    static_configs:
      - targets: ['localhost:5201']
    metrics_path: /metrics
    labels:
      server_type: 'tools'
      server_name: 'notification'

  - job_name: 'mcp-compliance-server'
    static_configs:
      - targets: ['localhost:5202']
    metrics_path: /metrics
    labels:
      server_type: 'tools'
      server_name: 'compliance'

  - job_name: 'mcp-sla-server'
    static_configs:
      - targets: ['localhost:5203']
    metrics_path: /metrics
    labels:
      server_type: 'tools'
      server_name: 'sla'

  # ─────────────────────────────────────────────────────────────────────────────
  # MCP SERVERS GROUP (All servers together for aggregation)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'mcp-servers-all'
    static_configs:
      - targets:
          - 'localhost:5001'  # FAQ Server
          - 'localhost:5002'  # RAG Server
          - 'localhost:5003'  # KB Server
          - 'localhost:5101'  # Email Server
          - 'localhost:5102'  # Voice Server
          - 'localhost:5103'  # Chat Server
          - 'localhost:5104'  # Ticketing Server
          - 'localhost:5201'  # Notification Server
          - 'localhost:5202'  # Compliance Server
          - 'localhost:5203'  # SLA Server
    metrics_path: /metrics
    scrape_interval: 15s

  # ─────────────────────────────────────────────────────────────────────────────
  # REDIS (if redis_exporter is available)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
    scrape_interval: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # POSTGRESQL (if postgres_exporter is available)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:9187']
    scrape_interval: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # NODE EXPORTER (System metrics)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 30s
