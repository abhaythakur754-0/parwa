# PARWA Performance Alert Rules
# Week 26 - Builder 5: Performance Monitoring + Load Testing
# Target: P95 <300ms at 500 concurrent users

groups:
  - name: parwa_performance
    interval: 30s
    rules:
      # P95 Latency Alerts
      - alert: P95LatencyHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[2m])) > 0.3
        for: 2m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "P95 latency exceeds 300ms"
          description: "P95 latency is {{ $value | humanizeDuration }} which exceeds the 300ms target. Check for performance bottlenecks."
          runbook_url: "https://docs.parwa.internal/runbooks/p95-latency"

      - alert: P95LatencyCritical
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[2m])) > 0.5
        for: 1m
        labels:
          severity: critical
          category: performance
        annotations:
          summary: "P95 latency critical - exceeds 500ms"
          description: "P95 latency is {{ $value | humanizeDuration }}. Immediate investigation required."
          runbook_url: "https://docs.parwa.internal/runbooks/p95-critical"

      # Error Rate Alerts
      - alert: ErrorRateHigh
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
          category: reliability
        annotations:
          summary: "Error rate exceeds 1%"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: ErrorRateCritical
        expr: rate(http_requests_total{status=~"5.."}[2m]) / rate(http_requests_total[2m]) > 0.05
        for: 1m
        labels:
          severity: critical
          category: reliability
        annotations:
          summary: "Error rate critical - exceeds 5%"
          description: "Error rate is {{ $value | humanizePercentage }}. Immediate investigation required."

      # Cache Hit Rate Alerts
      - alert: CacheHitRateLow
        expr: parwa_cache_hit_rate < 0.70
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Cache hit rate below 70%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}. Check cache invalidation logic."

      - alert: CacheHitRateCritical
        expr: parwa_cache_hit_rate < 0.50
        for: 3m
        labels:
          severity: critical
          category: performance
        annotations:
          summary: "Cache hit rate critical - below 50%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}. Cache may not be working correctly."

      # Database Connection Pool Alerts
      - alert: DBConnectionsHigh
        expr: parwa_db_connections_active / parwa_db_connections_max > 0.80
        for: 3m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "Database connection pool above 80%"
          description: "{{ $value | humanizePercentage }} of database connections in use. Consider increasing pool size."

      - alert: DBConnectionsExhausted
        expr: parwa_db_connections_active >= parwa_db_connections_max
        for: 1m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "Database connection pool exhausted"
          description: "All database connections are in use. New requests may be failing."

      # Response Size Alerts
      - alert: ResponseSizeLarge
        expr: rate(http_response_size_bytes_sum[5m]) / rate(http_response_size_bytes_count[5m]) > 1048576
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Average response size exceeds 1MB"
          description: "Average response size is {{ $value | humanizeBytes }}. Consider implementing pagination or compression."

      # Request Rate Alerts
      - alert: RequestRateHigh
        expr: rate(http_requests_total[1m]) > 1000
        for: 2m
        labels:
          severity: info
          category: traffic
        annotations:
          summary: "High request rate detected"
          description: "Request rate is {{ $value | humanize }} requests/second. Monitor for performance impact."

      # Latency by Endpoint
      - alert: EndpointLatencyHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) by (endpoint) > 0.5
        for: 3m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High latency on endpoint {{ $labels.endpoint }}"
          description: "P95 latency for {{ $labels.endpoint }} is {{ $value | humanizeDuration }}."

      # Database Query Performance
      - alert: SlowDatabaseQueries
        expr: rate(db_query_duration_seconds_sum[5m]) / rate(db_query_duration_seconds_count[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "Slow database queries detected"
          description: "Average query time is {{ $value | humanizeDuration }}. Check for missing indexes."

      # Redis Connection Alerts
      - alert: RedisConnectionsHigh
        expr: redis_connected_clients > 80
        for: 2m
        labels:
          severity: warning
          category: cache
        annotations:
          summary: "Redis connections high"
          description: "Redis has {{ $value }} connected clients."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 3m
        labels:
          severity: warning
          category: cache
        annotations:
          summary: "Redis memory usage above 85%"
          description: "Redis memory usage is {{ $value | humanizePercentage }}."

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[1m]) > 0.8
        for: 3m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}."

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / node_memory_MemTotal_bytes > 0.85
        for: 3m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}."

      # Rate Limiting Alerts
      - alert: RateLimitThresholdReached
        expr: rate(http_requests_total{status="429"}[5m]) > 10
        for: 2m
        labels:
          severity: info
          category: traffic
        annotations:
          summary: "Rate limiting active"
          description: "{{ $value }} requests/second are being rate limited. Consider scaling."
