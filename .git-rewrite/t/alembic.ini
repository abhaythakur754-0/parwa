# PARWA Alembic Configuration
# =============================
# This is the Alembic configuration file for database migrations.
# The actual database URL is configured dynamically in env.py from
# the application settings (shared/core_functions/config.py)

[alembic]
# Path to migration scripts
script_location = database/migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Prepend sys.path - allows imports from project root
prepend_sys_path = .

# Timezone for revision timestamp
timezone = UTC

# Truncate revision id to 8 characters
truncate_slug_length = 40

# Set to 'true' for offline mode (generate SQL scripts without DB connection)
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
