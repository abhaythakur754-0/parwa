# ════════════════════════════════════════════════════════════════
# PARWA — Production Docker Compose
# Full stack deployment configuration
# ════════════════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.prod.yml up -d
# ════════════════════════════════════════════════════════════════

version: "3.9"

services:
  # ──────────────────────────────────────────────────────────────
  # Frontend - Next.js Application
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: parwa-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=https://api.parwa.ai
    networks:
      - parwa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ──────────────────────────────────────────────────────────────
  # Backend - FastAPI Application
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: parwa-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://parwa:${POSTGRES_PASSWORD}@postgres:5432/parwa
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PADDLE_API_KEY=${PADDLE_API_KEY}
      - PADDLE_WEBHOOK_SECRET=${PADDLE_WEBHOOK_SECRET}
    networks:
      - parwa-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ──────────────────────────────────────────────────────────────
  # Worker - Background Task Processor
  # ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: parwa-worker
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://parwa:${POSTGRES_PASSWORD}@postgres:5432/parwa
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - parwa-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ──────────────────────────────────────────────────────────────
  # MCP Server - Model Context Protocol
  # ──────────────────────────────────────────────────────────────
  mcp:
    build:
      context: .
      dockerfile: infra/docker/mcp.Dockerfile
    container_name: parwa-mcp
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://parwa:${POSTGRES_PASSWORD}@postgres:5432/parwa
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - parwa-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ──────────────────────────────────────────────────────────────
  # Nginx - Reverse Proxy
  # ──────────────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
    container_name: parwa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/ssl:/etc/nginx/ssl:ro
      - certbot-data:/var/www/certbot:ro
    networks:
      - parwa-network
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ──────────────────────────────────────────────────────────────
  # PostgreSQL - Primary Database
  # ──────────────────────────────────────────────────────────────
  postgres:
    build:
      context: .
      dockerfile: infra/docker/postgres.Dockerfile
    container_name: parwa-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=parwa
      - POSTGRES_USER=parwa
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - parwa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parwa -d parwa"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ──────────────────────────────────────────────────────────────
  # Redis - Cache & Session Store
  # ──────────────────────────────────────────────────────────────
  redis:
    build:
      context: .
      dockerfile: infra/docker/redis.Dockerfile
    container_name: parwa-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    networks:
      - parwa-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# ──────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────
networks:
  parwa-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ──────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  certbot-data:
    driver: local
