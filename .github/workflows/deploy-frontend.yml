on:
  workflow_dispatch:  # Only run when manually triggered

env:
  NODE_VERSION: '20'

jobs:
  deploy-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Disabled
        run: |
          echo "AWS deployment is disabled."
          echo "To enable:"
          echo "1. Add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to GitHub secrets"
          echo "2. Uncomment the 'on' section in this workflow file"
