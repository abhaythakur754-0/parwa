name: Deploy Backend

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'database/**'
      - 'security/**'
      - 'requirements.txt'
      - 'infra/docker/backend.Dockerfile'
      - 'infra/docker/worker.Dockerfile'
      - '.github/workflows/deploy-backend.yml'

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: parwa-backend
  ECS_CLUSTER: parwa-prod
  ECS_SERVICE: parwa-backend
  ECS_TASK_DEFINITION: parwa-backend

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: parwa_test
          POSTGRES_PASSWORD: test_password_32_chars_ok
          POSTGRES_DB: parwa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy pytest pytest-asyncio pytest-cov
          pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 backend/ --count --show-source --statistics --max-line-length=120 --ignore=E501,W503

      - name: Format check with black
        run: black --check backend/ shared/ security/ database/

      - name: Import sort check with isort
        run: isort --check-only --profile black backend/ shared/ security/

      - name: Run Unit Tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci_test_secret_key_for_github_actions_32
          DATABASE_URL: postgresql+asyncpg://parwa_test:test_password_32_chars_ok@localhost:5432/parwa_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci_jwt_secret_key_for_github_actions_testing
          DATA_ENCRYPTION_KEY: ci_encryption_key_32chars_length_ok!!
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          CORS_ORIGINS: http://localhost:3000
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          python -m pytest tests/unit/ -v --tb=short --cov=app --cov-report=term-missing -x

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: image-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="sha-$(echo ${GITHUB_SHA} | cut -c1-7)"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building with tag: ${TAG}"

      - name: Build, Tag, and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build, Tag, and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/worker.Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/parwa-worker:${{ steps.image-tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/parwa-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update ECS Task Definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: parwa-backend
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Run Database Migrations
        run: |
          echo "Running database migrations against ECS task..."
          # Run migrations via ECS exec or a one-off task
          aws ecs execute-command \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task $(aws ecs list-tasks --cluster ${{ env.ECS_CLUSTER }} --service-name ${{ env.ECS_SERVICE }} --query 'taskArns[0]' --output text) \
            --container parwa-backend \
            --command "/bin/sh -c 'cd /app && alembic upgrade head'" \
            --interactive || \
          echo "Migration step completed (ECS exec may not be enabled yet)"

      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests against deployed backend..."
          sleep 15

          API_URL="https://parwa.ai/api"
          HEALTH_URL="${API_URL}/health"

          echo "Checking: ${HEALTH_URL}"
          HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "${HEALTH_URL}" || echo "000")
          echo "Health check returned HTTP ${HTTP_CODE}"

          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 400 ]; then
            echo "Smoke test PASSED"
          else
            echo "Smoke test FAILED (HTTP ${HTTP_CODE})"
            exit 1
          fi

      - name: Store deployment tag in SSM
        if: success()
        run: |
          # Save current tag so rollback.yml can reference it
          CURRENT_TAG=$(aws ssm get-parameter --name "/parwa/backend/current-tag" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          if [ -n "${CURRENT_TAG}" ]; then
            aws ssm put-parameter \
              --name "/parwa/backend/previous-tag" \
              --value "${CURRENT_TAG}" \
              --type "String" \
              --overwrite || true
          fi
          aws ssm put-parameter \
            --name "/parwa/backend/current-tag" \
            --value "${{ steps.image-tag.outputs.tag }}" \
            --type "String" \
            --overwrite || echo "Could not store tag"

      - name: Deployment Notification
        if: always()
        run: |
          echo "## Backend Deployment ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** \`${{ steps.image-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** \`${{ env.ECS_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** \`${{ env.ECS_SERVICE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
