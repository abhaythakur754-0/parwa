name: PR Check

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same PR to save resources
concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Backend: lint + unit tests
  # ──────────────────────────────────────────────
  backend-lint:
    name: Backend – Lint & Format
    runs-on: ubuntu-latest
    if: contains(paths, 'backend/') || contains(paths, 'shared/') || contains(paths, 'security/') || contains(paths, 'database/') || contains(paths, 'requirements.txt')
    env:
      PYTHON_VERSION: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
          pip install -r requirements.txt

      - name: Flake8
        run: flake8 backend/ --count --show-source --statistics --max-line-length=120 --ignore=E501,W503

      - name: Black (format check)
        run: black --check backend/ shared/ security/ database/

      - name: isort (import sort check)
        run: isort --check-only --profile black backend/ shared/ security/

  backend-tests:
    name: Backend – Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    if: contains(paths, 'backend/') || contains(paths, 'shared/') || contains(paths, 'security/') || contains(paths, 'database/') || contains(paths, 'requirements.txt')
    env:
      PYTHON_VERSION: "3.12"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: parwa_test
          POSTGRES_PASSWORD: test_password_32_chars_ok
          POSTGRES_DB: parwa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci_test_secret_key_for_github_actions_32
          DATABASE_URL: postgresql+asyncpg://parwa_test:test_password_32_chars_ok@localhost:5432/parwa_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci_jwt_secret_key_for_github_actions_testing
          DATA_ENCRYPTION_KEY: ci_encryption_key_32chars_length_ok!!
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          CORS_ORIGINS: http://localhost:3000
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          python -m pytest tests/unit/ -v --tb=short --cov=app --cov-report=term-missing -x

  # ──────────────────────────────────────────────
  # Frontend: lint + type check + build
  # ──────────────────────────────────────────────
  frontend-check:
    name: Frontend – Lint · Type Check · Build
    runs-on: ubuntu-latest
    if: contains(paths, 'src/') || contains(paths, 'public/') || contains(paths, 'package.json') || contains(paths, 'tsconfig.json') || contains(paths, 'next.config.')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type Check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: https://parwa.ai
          NEXT_PUBLIC_PADDLE_KEY: ""
