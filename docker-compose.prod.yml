# ════════════════════════════════════════════════════════════════
# PARWA — Production Docker Compose
# All services with health checks, network isolation, and security
# ════════════════════════════════════════════════════════════════
version: "3.9"

services:
  # ───────────────────────────────────────────────────────────────
  # PostgreSQL Database (Production)
  # ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: parwa_prod_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Redis Cache & Message Queue (Production)
  # ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parwa_prod_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Backend API (Production)
  # ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    image: parwa/backend:${VERSION:-latest}
    container_name: parwa_prod_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - PADDLE_CLIENT_TOKEN=${PADDLE_CLIENT_TOKEN}
      - PADDLE_API_KEY=${PADDLE_API_KEY}
      - PADDLE_WEBHOOK_SECRET=${PADDLE_WEBHOOK_SECRET}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - STATE_SERIALIZATION_PATH=/app/state_data
      - STATE_SERIALIZATION_ENABLED=true
    env_file:
      - .env.prod
    volumes:
      - state_prod_data:/app/state_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
      - frontend_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
      replicas: 2
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Background Worker (Production)
  # ───────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    image: parwa/worker:${VERSION:-latest}
    container_name: parwa_prod_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - STATE_SERIALIZATION_PATH=/app/state_data
      - STATE_SERIALIZATION_ENABLED=true
    env_file:
      - .env.prod
    volumes:
      - state_prod_data:/app/state_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # MCP Server (Production)
  # ───────────────────────────────────────────────────────────────
  mcp:
    build:
      context: .
      dockerfile: infra/docker/mcp.Dockerfile
    image: parwa/mcp:${VERSION:-latest}
    container_name: parwa_prod_mcp
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - db
      - redis
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Frontend - Next.js (Production)
  # ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    image: parwa/frontend:${VERSION:-latest}
    container_name: parwa_prod_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.parwa.ai
      - NEXT_PUBLIC_ENV=production
      - NEXT_PUBLIC_PADDLE_KEY=${NEXT_PUBLIC_PADDLE_KEY}
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Prometheus Monitoring (Production)
  # ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: parwa_prod_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Grafana Dashboards (Production)
  # ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.0
    container_name: parwa_prod_grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitoring.parwa.ai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - prometheus
    networks:
      - monitoring_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy (Production)
  # ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: parwa_prod_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - backend
      - frontend
    networks:
      - frontend_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true

# ───────────────────────────────────────────────────────────────
# Networks (Isolated)
# ───────────────────────────────────────────────────────────────
networks:
  backend_network:
    driver: bridge
    internal: true  # Not accessible from outside
  frontend_network:
    driver: bridge
  monitoring_network:
    driver: bridge
    internal: true

# ───────────────────────────────────────────────────────────────
# Volumes (Persistent)
# ───────────────────────────────────────────────────────────────
volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  state_prod_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local
