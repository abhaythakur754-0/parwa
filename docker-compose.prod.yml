# ════════════════════════════════════════════════════════════════
# PARWA — Production Docker Compose
# All services with health checks, network isolation, and security
# ════════════════════════════════════════════════════════════════
#
# F14: Images that should be pinned by digest in production:
#   - postgres:15-alpine
#   - redis:7-alpine
#   - prom/prometheus:v2.45.0
#   - grafana/grafana:10.0.0
#   - prom/alertmanager:v0.26.0
#   - oliver006/redis_exporter:v1.55.0-alpine
#   - prometheuscommunity/postgres-exporter:v0.15.0
#   - prom/node-exporter:v1.6.1
#   - nginx:1.25-alpine
# NOTE: Fetch digests with:
#   docker pull <image> && docker inspect --format='{{index .RepoDigests 0}}' <image>
#   Then use: image: <image>@sha256:<digest>
version: "3.9"

services:
  # ───────────────────────────────────────────────────────────────
  # PostgreSQL Database (Production)
  # ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: parwa_prod_db
    restart: always
    # No port exposure in production — internal only
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Redis Cache & Message Queue (Production)
  # ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parwa_prod_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    # No port exposure in production — internal only
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Backend API (Production)
  # ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    image: parwa/backend:${VERSION:-latest}
    container_name: parwa_prod_backend
    restart: always
    read_only: true  # F15: Immutable filesystem
    tmpfs:
      - /tmp
      - /app/state_data
    cap_drop:
      - ALL  # F16: Drop all Linux capabilities
    # No port exposure — accessed via nginx on frontend_network
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - PADDLE_CLIENT_TOKEN=${PADDLE_CLIENT_TOKEN}
      - PADDLE_API_KEY=${PADDLE_API_KEY}
      - PADDLE_WEBHOOK_SECRET=${PADDLE_WEBHOOK_SECRET}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - STATE_SERIALIZATION_PATH=/app/state_data
      - STATE_SERIALIZATION_ENABLED=true
    env_file:
      - .env.prod
    volumes:
      - state_prod_data:/app/state_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
      - frontend_network
      - monitoring_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
      replicas: 2
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Background Worker (Production)
  # ───────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    image: parwa/worker:${VERSION:-latest}
    container_name: parwa_prod_worker
    restart: always
    read_only: true  # F15: Immutable filesystem
    tmpfs:
      - /tmp
      - /app/state_data
    cap_drop:
      - ALL  # F16: Drop all Linux capabilities
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - STATE_SERIALIZATION_PATH=/app/state_data
      - STATE_SERIALIZATION_ENABLED=true
    env_file:
      - .env.prod
    volumes:
      - state_prod_data:/app/state_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'backend.worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ───────────────────────────────────────────────────────────────
  # MCP Server (Production)
  # ───────────────────────────────────────────────────────────────
  mcp:
    build:
      context: .
      dockerfile: infra/docker/mcp.Dockerfile
    image: parwa/mcp:${VERSION:-latest}
    container_name: parwa_prod_mcp
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - db
      - redis
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Frontend - Next.js (Production)
  # ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.prod.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://parwa.ai}
        NEXT_PUBLIC_PADDLE_KEY: ${NEXT_PUBLIC_PADDLE_KEY:-}
    image: parwa/frontend:${VERSION:-latest}
    container_name: parwa_prod_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://parwa.ai}
      - NEXT_PUBLIC_ENV=production
      - NEXT_PUBLIC_PADDLE_KEY=${NEXT_PUBLIC_PADDLE_KEY:-}
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ═══════════════════════════════════════════════════════════════
  # MONITORING STACK
  # ═══════════════════════════════════════════════════════════════

  # ───────────────────────────────────────────────────────────────
  # Prometheus Monitoring (Production)
  # ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: parwa_prod_prometheus
    restart: always
    user: "65534:65534"  # nobody user
    # Internal only — no port exposure
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting/rules.yml:/etc/prometheus/rules/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Grafana Dashboards (Production)
  # ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.0
    container_name: parwa_prod_grafana
    restart: always
    user: "472:472"  # grafana user (non-root)
    # Grafana accessible via nginx /grafana/ or monitoring.parwa.ai
    # Port NOT exposed to internet for security
    # ports:
    #   - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana_dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER required}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitoring.parwa.ai
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - prometheus
    networks:
      - monitoring_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Alertmanager (Production)
  # ───────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: parwa_prod_alertmanager
    restart: always
    user: "65534:65534"  # nobody user
    # Internal only — no port exposure
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://monitoring.parwa.ai/alertmanager'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Redis Exporter (Production)
  # ───────────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0-alpine
    container_name: parwa_prod_redis_exporter
    restart: always
    # Internal only — no port exposure
    environment:
      - REDIS_ADDR=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_EXPORTER_LOG_FORMAT=json
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - monitoring_network
      - backend_network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # PostgreSQL Exporter (Production)
  # ───────────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: parwa_prod_postgres_exporter
    restart: always
    # Internal only — no port exposure
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=require
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitoring_network
      - backend_network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Node Exporter (Production)
  # ───────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: parwa_prod_node_exporter
    restart: always
    user: "65534:65534"  # nobody user
    # F17: SECURITY — node-exporter mounts host rootfs.
    # The /:/host:ro,rslave mount exposes the entire host filesystem
    # (read-only) to the container. To further restrict access:
    #   1. Use --path.rootfs with a dedicated empty directory
    #   2. Replace /:/host:ro,rslave with specific paths only
    #   3. Enable '--collector.filesystem.ignored-mount-points'
    #      to exclude sensitive mount points like /etc/shadow
    #   4. Consider running node-exporter directly on the host
    #      via systemd instead of Docker to avoid mount exposure
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($|/)'
      - '--no-collector.ipvs'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    networks:
      - monitoring_network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy (Production)
  # ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: parwa_prod_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - backend
      - frontend
    networks:
      - frontend_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true

# ───────────────────────────────────────────────────────────────
# Networks (Isolated)
# ───────────────────────────────────────────────────────────────
networks:
  backend_network:
    driver: bridge
    internal: true  # Not accessible from outside — db, redis, backend, worker only
  frontend_network:
    driver: bridge   # External-facing — frontend, nginx, backend (for API proxy)
  monitoring_network:
    driver: bridge
    internal: true   # Not accessible from outside — prometheus, grafana, exporters, backend

# ───────────────────────────────────────────────────────────────
# Volumes (Persistent)
# ───────────────────────────────────────────────────────────────
volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  state_prod_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  nginx_logs:
    driver: local
