[alembic]
# Bug Fix Day 4: script_location can be overridden via ALEMBIC_MIGRATIONS_DIR env var.
# Defaults to relative "alembic" for backward compatibility.
# Set ALEMBIC_MIGRATIONS_DIR=/absolute/path/to/migrations to override.
script_location = alembic
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
