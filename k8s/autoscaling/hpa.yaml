# Horizontal Pod Autoscaler for PARWA
# Week 37: Autoscaling configuration for 50-client scale

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: parwa-backend-hpa
  namespace: parwa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parwa-backend
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
