<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PARWA</title>
<style>
  body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,
    'Segoe UI',Roboto,sans-serif;background:#f4f6f9;color:#333}
  .container{max-width:600px;margin:40px auto;background:#fff;
    border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .header{background:linear-gradient(135deg,#8b5cf6,#7c3aed);
    padding:30px 40px;text-align:center}
  .header h1{color:#fff;margin:0;font-size:24px;letter-spacing:1px}
  .header p{color:rgba(255,255,255,.85);margin:6px 0 0;font-size:13px}
  .content{padding:30px 40px}
  .content p{font-size:16px;line-height:1.6;margin:0 0 20px}
  .content ul{padding-left:20px;margin-bottom:20px}
  .content li{font-size:16px;line-height:1.6;margin-bottom:8px}
  .content h2{font-size:22px;margin:0 0 16px;color:#1e1b4b}
  .btn{display:inline-block;padding:14px 32px;background:#8b5cf6;
    color:#fff!important;text-decoration:none;border-radius:6px;
    font-weight:600;font-size:16px}
  .btn:hover{background:#7c3aed}
  .footer{padding:20px 40px;text-align:center;font-size:12px;
    color:#999;border-top:1px solid #eee}
  .footer a{color:#8b5cf6;text-decoration:none}
  @media only screen and (max-width:600px){
    .container{margin:0;border-radius:0}
    .header{padding:24px 20px}
    .content{padding:24px 20px}
    .footer{padding:16px 20px}
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>PARWA</h1>
    <p>AI Workforce Platform</p>
  </div>
  <div class="content">
    {% block body %}{% endblock %}
  </div>
  <div class="footer">
    <p>&copy; 2026 PARWA. All rights reserved.</p>
    <p>
      <a href="{{ unsubscribe_url | default('#') }}">Unsubscribe</a>
      &middot;
      <a href="https://parwa.ai">parwa.ai</a>
    </p>
    <p style="margin-top:8px;font-size:11px">
      This email was sent by PARWA AI Workforce.<br>
      If you did not request this, please ignore it.
    </p>
  </div>
</div>
</body>
</html>
