# ════════════════════════════════════════════════════════════════
# PARWA — Default Site Configuration (Production)
# Consolidated + hardened. Issues fixed: #121, #122, #125, #126,
# #127, #128, #129, #131, #133, #134, #135
# BC-012: All timestamps in UTC
# ════════════════════════════════════════════════════════════════

# ────────────────────────────────────────────────────────────────
# Shared security headers snippet (included via nginx map/add_header)
# NOTE: Nginx does NOT inherit add_header from parent blocks.
# Every location block with add_header must repeat ALL security headers.
# ────────────────────────────────────────────────────────────────

# ────────────────────────────────────────────────────────────────
# HTTP → HTTPS Redirect Server (IPv4 + IPv6)
# ────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;                    # IPv6 support
    server_name _;

    # Health check endpoint (no redirect — for load balancer checks)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ────────────────────────────────────────────────────────────────
# HTTPS Server — SSL Termination with Production Best Practices
# Issues fixed: #121, #122, #125, #126, #127, #128, #129, #133
# ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;         # IPv6 support
    server_name parwa.ai *.parwa.ai;

    # ── SSL Certificate Paths ──────────────────────────────────
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL trust chain for OCSP stapling  #131
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

    # ── HSTS (1 year, includeSubDomains, preload) ──────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Security Headers (server-block level) ─────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # #125, #126: Removed 'unsafe-eval' from CSP
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://parwa.ai wss://parwa.ai; frame-ancestors 'none';" always;

    # ── API proxy ──────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        # #121, #133: Must repeat ALL security headers in every location
        # that uses add_header (nginx does not inherit from server block)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://parwa.ai wss://parwa.ai; frame-ancestors 'none';" always;

        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Don't buffer API responses
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ── Auth endpoints with stricter rate limiting ─────────────
    # #122: Added burst=10 nodelay (was burst=5 nodelay)
    location /api/auth/login {
        limit_req zone=login burst=10 nodelay;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://parwa.ai wss://parwa.ai; frame-ancestors 'none';" always;

        proxy_pass http://backend/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend docs endpoints — BLOCKED in production  #128 ──
    location /docs {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        return 403;
    }

    location /openapi.json {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        return 403;
    }

    # ── WebSocket support for Jarvis terminal ──────────────────
    location /ws/ {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        proxy_pass http://backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ── Frontend — serve static files and fallback to index ────
    location / {
        limit_req zone=general burst=30 nodelay;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://parwa.ai wss://parwa.ai; frame-ancestors 'none';" always;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public, immutable";

            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
        }
    }

    # ── Health check endpoint (HTTPS) ──────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Block sensitive files  #127, #49 ───────────────────────
    location ~* /\.(env|git) {
        deny all;
        return 403;
    }

    location ~* /(wp-admin|wp-login|xmlrpc\.php) {
        deny all;
        return 403;
    }

    # ── Deny access to hidden files ────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
