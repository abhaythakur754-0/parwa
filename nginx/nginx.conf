# ════════════════════════════════════════════════════════════════
# PARWA — Consolidated Nginx Configuration (Production)
# Merged from infra/docker/nginx.conf + infra/docker/nginx-default.conf
# Issues fixed: #119, #120, #124, #125, #129, #131, #133, #134, #135
# BC-012: All log timestamps in UTC
# ════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;          # #119: increased from 1024
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with upstream response time for monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Hide Nginx version  #120
    server_tokens off;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;
    client_body_buffer_size 16k;       # #124: increased from default

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript
               image/svg+xml;

    # ────────────────────────────────────────────────────────────
    # SSL/TLS Global Settings
    # ────────────────────────────────────────────────────────────
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # TLS protocols: 1.2 minimum, 1.3 preferred
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suite (Mozilla Modern configuration)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling  #131: added ssl_trusted_certificate
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Diffie-Hellman parameters for DHE ciphers  #135
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ────────────────────────────────────────────────────────────
    # Rate Limiting Zones
    # ────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;     # General rate limit

    # #123, #129: Return 429 instead of 503 when rate limited
    limit_req_status 429;

    # ────────────────────────────────────────────────────────────
    # Upstream Definitions (least_conn strategy)
    # ────────────────────────────────────────────────────────────
    upstream frontend {
        least_conn;
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        least_conn;
        server backend:8000;
        keepalive 32;
    }

    # Include site configurations
    include /etc/nginx/conf.d/*.conf;
}
