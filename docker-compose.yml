# ╔══════════════════════════════════════════════════════════════════╗
# ║  ⚠️  DEVELOPMENT ONLY — DO NOT USE IN PRODUCTION              ║
# ║                                                                ║
# ║  This compose file exposes database (5432), Redis (6379),      ║
# ║  backend (8000), and frontend (3000) ports to 0.0.0.0.         ║
# ║  In production, use:                                           ║
# ║    - Internal Docker networks (no host port binding)           ║
# ║    - Separate production compose with proper secrets          ║
# ║    - TLS termination via reverse proxy (nginx/ALB)            ║
# ║    - Environment-specific .env with real secrets              ║
# ╚══════════════════════════════════════════════════════════════════╝


services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: parwa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parwa_dev}
      POSTGRES_DB: ${POSTGRES_DB:-parwa_db}
    # M-24: Dev-only — bind to localhost in production
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parwa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Redis Cache & Message Queue
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parwa_redis
    restart: unless-stopped
    # M-24/M-25: Redis with password + bind to localhost only
    command: redis-server --requirepass ${REDIS_PASSWORD:-parwa_dev_redis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-parwa_dev_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Backend — FastAPI
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: parwa_backend
    restart: unless-stopped
    # M-24: Dev-only — bind to localhost in production
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-parwa}:${POSTGRES_PASSWORD:-parwa_dev}@db:5432/${POSTGRES_DB:-parwa_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-parwa_dev_redis}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-parwa_dev_redis}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-parwa_dev_redis}@redis:6379/2
      - PYTHONPATH=/app:/app/backend
      - ENVIRONMENT=development
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-key-change-in-production}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:-devkey_devkey_devkey_devkey_abcd}
      - STATE_SERIALIZATION_PATH=/app/state_data
      - STATE_SERIALIZATION_ENABLED=true
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - ./database:/app/database
      - state_data:/app/state_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Worker — Celery Background Jobs
  # ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: parwa_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-parwa}:${POSTGRES_PASSWORD:-parwa_dev}@db:5432/${POSTGRES_DB:-parwa_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-parwa_dev_redis}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-parwa_dev_redis}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-parwa_dev_redis}@redis:6379/2
      - PYTHONPATH=/app:/app/backend
      - ENVIRONMENT=development
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-key-change-in-production}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:-devkey_devkey_devkey_devkey_abcd}
      - STATE_SERIALIZATION_PATH=/app/state_data
      - STATE_SERIALIZATION_ENABLED=true
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - ./database:/app/database
      - state_data:/app/state_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.worker' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Frontend — Next.js 16 (dev mode)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      target: dev
    container_name: parwa_frontend
    restart: unless-stopped
    # M-24: Dev-only — bind to localhost in production
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - SERVER_API_URL=http://backend:8000
      - NODE_ENV=development
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./next.config.mjs:/app/next.config.mjs
      - ./tailwind.config.mts:/app/tailwind.config.mts
      - ./tsconfig.json:/app/tsconfig.json
      - ./components.json:/app/components.json
      - ./postcss.config.mjs:/app/postcss.config.mjs
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  state_data:

networks:
  default:
    name: parwa_network
