version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: parwa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parwa_dev}
      POSTGRES_DB: ${POSTGRES_DB:-parwa_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
#      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parwa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis Cache & Message Queue
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parwa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Backend — FastAPI
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: parwa_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-parwa}:${POSTGRES_PASSWORD:-parwa_dev}@db:5432/${POSTGRES_DB:-parwa_db}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app:/app/backend
      - ENVIRONMENT=development
      - STATE_SERIALIZATION_PATH=/app/state_data
      - STATE_SERIALIZATION_ENABLED=true
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - state_data:/app/state_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────
  # Worker — Celery Background Jobs
  # ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: parwa_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-parwa}:${POSTGRES_PASSWORD:-parwa_dev}@db:5432/${POSTGRES_DB:-parwa_db}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app:/app/backend
      - ENVIRONMENT=development
      - STATE_SERIALIZATION_PATH=/app/state_data
      - STATE_SERIALIZATION_ENABLED=true
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - state_data:/app/state_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Frontend — Next.js
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    container_name: parwa_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ENV=development
      - NODE_ENV=development
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  state_data:

networks:
  default:
    name: parwa_network
